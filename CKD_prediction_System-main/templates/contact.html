<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CKD Project - Contact</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <nav>
            <div class="logo">CKD<span>Analyzer</span></div>
            <div class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="concept.html">Concept</a>
                <a href="dashboard.html">Dashboard</a>
            </div>
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        </nav>

        <div class="contact-box">
            <h2 style="text-align: center; margin-bottom: 30px;">Contact Us</h2>
            <form id="contactForm">
                <div class="form-group" style="margin-bottom: 20px;">
                    <label>Name</label>
                    <input type="text" class="form-control" required>
                </div>
                <div class="form-group" style="margin-bottom: 20px;">
                    <label>Email</label>
                    <input type="email" class="form-control" required>
                </div>
                <div class="form-group" style="margin-bottom: 20px;">
                    <label>Message</label>
                    <textarea class="form-control" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Send Message</button>
            </form>
            <div id="successMsg" class="success-msg">Thank you! Your message has been sent.</div>
            <div style="text-align: center; margin-top: 20px;">
                <a href="index.html" style="color: var(--text-muted); font-size: 0.9rem;">&larr; Back to Home</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
